<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <title>Mini Social</title>
  <link rel="stylesheet" href="css/style.css">
  <link href="https://wallpapers.com/images/hd/funny-profile-picture-dzmoiwcbjtag4on6.jpg" rel="stylesheet">
</head>
<body>

<header>
  <h1 class="logo">Mini Social</h1>
</header>

<main class="feed">

  <article class="post">
    <div class="post-header">
      <img src="assets/profile.png" class="avatar">
      <div>
        <span class="name">Aninha</span>
        <span class="username">@userpedrezini</span>
      </div>
    </div>

    <p class="post-text">
      não vejo a hora de entrar na faculdade! </p>

    <div class="post-actions">
      <button id="likeBtn">Curtir</button>
      <span id="likeCount">0</span>
    </div>

    <div class="post-actions">
      <button id="DeslikeBtn">desCurtir</button>
      <span id="DeslikeCount">0</span>
    </div>

    <section class="comments">
      <div class="comment">
        <img src="assets/avatar.png" class="avatar-small">
        <p>alo univas</p>
      </div>

      <div class="comment">
        <img src="assets/avatar.png" class="avatar-small">
        <p> papo de vir federal</p>
      </div>
    </section>

  </article>

</main>

<script src="js/script.js"></script>
</body>
</html>
